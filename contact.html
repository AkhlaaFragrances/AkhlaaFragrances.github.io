<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أخِلَّاء للعطور | تواصل معنا</title>
    <style>
        body { background-color: #fafafa; color: #222222; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background-color: #ffffff; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e6c328; }
        .logo-text { color: #000000; font-size: 26px; font-weight: bold; }
        nav ul { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; }
        nav ul li a { text-decoration: none; color: #444444; font-weight: bold; font-size: 16px; }
        nav ul li a:hover { color: #e6c328; }
        
        /* تنسيق صفحة التواصل */
        .contact-container {
            max-width: 600px;
            margin: 80px auto;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 5px solid #e6c328;
        }
        .contact-container h1 {
            color: #111111;
            margin-bottom: 10px;
            font-size: 2.2em;
        }
        .contact-container p {
            color: #666666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn-contact {
            display: block;
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            border-radius: 5px;
            transition: transform 0.2s;
        }
        .btn-contact:hover {
            transform: scale(1.02);
        }
        
        /* ألوان الأزرار */
        .btn-whatsapp { background-color: #25D366; color: #ffffff; }
        .btn-facebook { background-color: #1877F2; color: #ffffff; }
        .btn-instagram { background-color: #E4405F; color: #ffffff; }

        footer { background-color: #111111; color: #ffffff; text-align: center; padding: 30px 20px; margin-top: 50px; border-top: 4px solid #e6c328; }
    </style>
</head>
<body>

    <!-- شريط التنقل العلوي -->
    <header>
        <div class="logo-text">أخِلَّاء للعطور</div>
        <nav>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="#">المجموعات العطرية</a></li>
                <li><a href="offers.html">الباقات والعروض</a></li>
                <li><a href="#">المسكات</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
            </ul>
        </nav>
    </header>

    <!-- صندوق التواصل -->
    <div class="contact-container">
        <h1>نسعد بتواصلك معنا</h1>
        <p>اختر المنصة الأنسب لك لطلب عطرك المفضل أو للاستفسار</p>
        
        <div class="social-buttons">
            <!-- يمكنك لاحقاً تعديل الروابط لتتوافق مع صفحات البراند -->
            <a href="https://wa.me/201000000000" class="btn-contact btn-whatsapp">تواصل عبر واتساب</a>
            <a href="#" class="btn-contact btn-facebook">صفحتنا على فيسبوك</a>
            <a href="#" class="btn-contact btn-instagram">حسابنا على إنستجرام</a>
        </div>
    </div>

    <!-- الفوتر -->
    <footer>
        <div class="logo-text" style="color: #e6c328; margin-bottom: 10px;">أخِلَّاء للعطور</div>
        <p>جميع الحقوق محفوظة © 2026</p>
    </footer>

</body>
</html>
