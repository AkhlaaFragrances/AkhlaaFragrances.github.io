<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أخِلَّاء للعطور | الباقات والعروض</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fafafa; color: #222222; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; }
        header { background-color: #ffffff; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e6c328; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo-text { color: #000000; font-size: 28px; font-weight: 700; }
        nav ul { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; }
        nav ul li a { text-decoration: none; color: #444444; font-weight: 700; font-size: 16px; transition: color 0.3s; }
        nav ul li a:hover { color: #e6c328; }
        
        .products-section { padding: 60px 20px; text-align: center; }
        .section-title { font-size: 2.2em; margin-bottom: 50px; color: #111111; position: relative; display: inline-block; }
        .section-title::after { content: ""; width: 50%; height: 3px; background-color: #e6c328; position: absolute; bottom: -15px; right: 25%; }

        .grid-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
        
        /* الكرت قابل للضغط بالكامل */
        .product-card { 
            background-color: #ffffff; border: 2px solid #e6c328; border-radius: 12px; padding: 20px; width: 320px; box-shadow: 0 4px 15px rgba(230, 195, 40, 0.1); display: flex; flex-direction: column; text-align: right; transition: all 0.3s ease;
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(230, 195, 40, 0.2); }

        .product-image-container { display: block; margin-bottom: 15px; overflow: hidden; border-radius: 8px; position: relative; }
        .product-image { width: 100%; height: 250px; background-color: #fffdf5; object-fit: cover; transition: transform 0.3s; }
        .product-card:hover .product-image { transform: scale(1.05); }
        
        .badge { position: absolute; top: 10px; right: 10px; background-color: #d32f2f; color: #ffffff; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9em; z-index: 2; }

        .product-name { color: #d32f2f; font-size: 1.6em; margin: 0 0 5px 0; font-weight: 700; transition: color 0.3s; }
        .product-card:hover .product-name { color: #111111; }
        
        .product-price { color: #b89b1c; font-size: 1.3em; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .old-price { text-decoration: line-through; color: #aaaaaa; font-size: 0.8em; }

        /* منع التداخل */
        .sizes-wrapper { display: flex; justify-content: flex-start; gap: 10px; margin-bottom: 20px; cursor: default; }
        .sizes-wrapper input[type="radio"] { display: none; }
        .sizes-wrapper label { padding: 6px 15px; border: 1px solid #e6c328; border-radius: 20px; cursor: pointer; font-size: 0.95em; font-weight: 700; color: #b89b1c; transition: 0.3s; }
        .sizes-wrapper input[type="radio"]:checked + label { background-color: #e6c328; color: #ffffff; }

        .btn-order { display: block; background-color: #e6c328; color: #111111; border: none; padding: 12px; text-decoration: none; border-radius: 25px; font-weight: 700; font-size: 1.1em; transition: 0.3s; cursor: pointer; width: 100%; text-align: center; }
        .btn-order:hover { background-color: #111111; color: #e6c328; }

        footer { background-color: #111111; color: #ffffff; text-align: center; padding: 30px 20px; margin-top: 50px; border-top: 4px solid #e6c328; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">أخِلَّاء للعطور</div>
        <nav>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="perfumes.html">المجموعات العطرية</a></li>
                <li><a href="offers.html">الباقات والعروض</a></li>
                <li><a href="musks.html">المسكات</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
            </ul>
        </nav>
    </header>

    <div class="products-section">
        <h2 class="section-title">الباقات الخاصة</h2>
        <div class="grid-container">
            
            <div class="product-card" onclick="window.location.href='product1.html';">
                
                <div class="product-image-container">
                    <span class="badge">الأكثر مبيعاً</span>
                    <img src="" alt="" class="product-image">
                </div>
                
                <h3 class="product-name">باندل الـ 3 عطور</h3>
                
                <div class="product-price">
                    <span id="new-price-o1">1200 ج.م</span>
                    <span class="old-price" id="old-price-o1">1500 ج.م</span>
                </div>
                
                <div class="sizes-wrapper" onclick="event.stopPropagation();">
                    <input type="radio" name="size-o1" id="o1-35" value="بحجم 35 مل" onchange="document.getElementById('new-price-o1').innerText='850 ج.م'; document.getElementById('old-price-o1').innerText='1050 ج.م';">
                    <label for="o1-35">35 مل</label>
                    
                    <input type="radio" name="size-o1" id="o1-55" value="بحجم 55 مل" checked onchange="document.getElementById('new-price-o1').innerText='1200 ج.م'; document.getElementById('old-price-o1').innerText='1500 ج.م';">
                    <label for="o1-55">55 مل</label>
                    
                    <input type="radio" name="size-o1" id="o1-110" value="بحجم 110 مل" onchange="document.getElementById('new-price-o1').innerText='2300 ج.م'; document.getElementById('old-price-o1').innerText='2700 ج.م';">
                    <label for="o1-110">110 مل</label>
                </div>
                <button class="btn-order" onclick="event.stopPropagation(); let size = document.querySelector('input[name=size-o1]:checked').value; window.open('https://wa.me/201212946789?text=أهلاً، أريد طلب (باندل الـ 3 عطور) ' + size, '_blank');">🛒 اطلب العرض الآن</button>
            </div>

            <div class="product-card" onclick="window.location.href='product1.html';">
                
                <div class="product-image-container">
                    <span class="badge">حصري</span>
                    <img src="" alt="" class="product-image">
                </div>
                
                <h3 class="product-name">باقة العرسان الفاخرة</h3>
                
                <div class="product-price">
                    <span id="new-price-o2">1150 ج.م</span>
                    <span class="old-price" id="old-price-o2">1400 ج.م</span>
                </div>
                
                <div class="sizes-wrapper" onclick="event.stopPropagation();">
                    <input type="radio" name="size-o2" id="o2-35" value="بحجم 35 مل" onchange="document.getElementById('new-price-o2').innerText='850 ج.م'; document.getElementById('old-price-o2').innerText='1000 ج.م';">
                    <label for="o2-35">35 مل</label>
                    
                    <input type="radio" name="size-o2" id="o2-55" value="بحجم 55 مل" checked onchange="document.getElementById('new-price-o2').innerText='1150 ج.م'; document.getElementById('old-price-o2').innerText='1400 ج.م';">
                    <label for="o2-55">55 مل</label>
                </div>
                <button class="btn-order" onclick="event.stopPropagation(); let size = document.querySelector('input[name=size-o2]:checked').value; window.open('https://wa.me/201212946789?text=أهلاً، أريد طلب (باقة العرسان الفاخرة) ' + size, '_blank');">🛒 اطلب العرض الآن</button>
            </div>

        </div>
    </div>
    <footer>
        <div class="logo-text" style="color: #e6c328; margin-bottom: 10px;">أخِلَّاء للعطور</div>
        <p>جميع الحقوق محفوظة © 2026</p>
    </footer>
</body>
</html>
