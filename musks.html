<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أخِلَّاء للعطور | المسكات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fafafa; color: #222222; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; }
        header { background-color: #ffffff; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e6c328; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo-text { color: #000000; font-size: 28px; font-weight: 700; }
        nav ul { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; }
        nav ul li a { text-decoration: none; color: #444444; font-weight: 700; font-size: 16px; transition: color 0.3s; }
        nav ul li a:hover { color: #e6c328; }
        
        .products-section { padding: 60px 20px; text-align: center; }
        .section-title { font-size: 2.2em; margin-bottom: 50px; color: #111111; position: relative; display: inline-block; }
        .section-title::after { content: ""; width: 50%; height: 3px; background-color: #e6c328; position: absolute; bottom: -15px; right: 25%; }

        .grid-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
        
        /* الكرت قابل للضغط بالكامل */
        .product-card { 
            background-color: #ffffff; border: 1px solid #eeeeee; border-radius: 12px; padding: 20px; width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; text-align: right; transition: all 0.3s ease;
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(230, 195, 40, 0.15); border-color: #e6c328; }

        .product-image-container { display: block; margin-bottom: 15px; overflow: hidden; border-radius: 8px; }
        .product-image { width: 100%; height: 250px; background-color: #f5f5f5; object-fit: cover; transition: transform 0.3s; }
        .product-card:hover .product-image { transform: scale(1.05); }
        
        .product-name { color: #111111; font-size: 1.6em; margin: 0 0 5px 0; font-weight: 700; transition: color 0.3s; }
        .product-card:hover .product-name { color: #e6c328; }
        
        .product-price { color: #b89b1c; font-size: 1.3em; font-weight: 700; margin-bottom: 15px; }

        /* منع التداخل للأحجام */
        .sizes-wrapper { display: flex; justify-content: flex-start; gap: 10px; margin-bottom: 20px; cursor: default; }
        .sizes-wrapper input[type="radio"] { display: none; }
        .sizes-wrapper label { padding: 6px 15px; border: 1px solid #e6c328; border-radius: 20px; cursor: pointer; font-size: 0.95em; font-weight: 700; color: #b89b1c; transition: 0.3s; }
        .sizes-wrapper input[type="radio"]:checked + label { background-color: #e6c328; color: #ffffff; }

        /* زر الطلب */
        .btn-order { display: block; background-color: #fffcf0; color: #b89b1c; border: none; padding: 12px; text-decoration: none; border-radius: 25px; font-weight: 700; font-size: 1.1em; transition: 0.3s; cursor: pointer; width: 100%; text-align: center; }
        .btn-order:hover { background-color: #e6c328; color: #ffffff; }

        footer { background-color: #111111; color: #ffffff; text-align: center; padding: 30px 20px; margin-top: 50px; border-top: 4px solid #e6c328; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">أخِلَّاء للعطور</div>
        <nav>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="perfumes.html">المجموعات العطرية</a></li>
                <li><a href="offers.html">الباقات والعروض</a></li>
                <li><a href="musks.html">المسكات</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
            </ul>
        </nav>
    </header>

    <div class="products-section">
        <h2 class="section-title">تشكيلة المسك الفاخرة</h2>
        <div class="grid-container">
            
            <div class="product-card" onclick="window.location.href='product1.html';">
                <div class="product-image-container">
                    <img src="" alt="" class="product-image">
                </div>
                <h3 class="product-name">مسك الرمان</h3>
                <div class="product-price" id="price-m1">150 ج.م / 15 مل</div>
                
                <div class="sizes-wrapper" onclick="event.stopPropagation();">
                    <input type="radio" name="size-m1" id="m1-15" value="15 مل" checked onchange="document.getElementById('price-m1').innerText='150 ج.م / 15 مل'">
                    <label for="m1-15">15 مل</label>
                    <input type="radio" name="size-m1" id="m1-30" value="30 مل" onchange="document.getElementById('price-m1').innerText='250 ج.م / 30 مل'">
                    <label for="m1-30">30 مل</label>
                    <input type="radio" name="size-m1" id="m1-50" value="50 مل" onchange="document.getElementById('price-m1').innerText='400 ج.م / 50 مل'">
                    <label for="m1-50">50 مل</label>
                </div>
                <button class="btn-order" onclick="event.stopPropagation(); let size = document.querySelector('input[name=size-m1]:checked').value; window.open('https://wa.me/201212946789?text=أهلاً، أريد طلب (مسك الرمان) بحجم ' + size, '_blank');">🛒 اطلب عبر واتساب</button>
            </div>

            <div class="product-card" onclick="window.location.href='product1.html';">
                <div class="product-image-container">
                    <img src="" alt="" class="product-image">
                </div>
                <h3 class="product-name">مسك الطهارة</h3>
                <div class="product-price" id="price-m2">180 ج.م / 15 مل</div>
                
                <div class="sizes-wrapper" onclick="event.stopPropagation();">
                    <input type="radio" name="size-m2" id="m2-15" value="15 مل" checked onchange="document.getElementById('price-m2').innerText='180 ج.م / 15 مل'">
                    <label for="m2-15">15 مل</label>
                    <input type="radio" name="size-m2" id="m2-30" value="30 مل" onchange="document.getElementById('price-m2').innerText='300 ج.م / 30 مل'">
                    <label for="m2-30">30 مل</label>
                    <input type="radio" name="size-m2" id="m2-50" value="50 مل" onchange="document.getElementById('price-m2').innerText='450 ج.م / 50 مل'">
                    <label for="m2-50">50 مل</label>
                </div>
                <button class="btn-order" onclick="event.stopPropagation(); let size = document.querySelector('input[name=size-m2]:checked').value; window.open('https://wa.me/201212946789?text=أهلاً، أريد طلب (مسك الطهارة) بحجم ' + size, '_blank');">🛒 اطلب عبر واتساب</button>
            </div>

        </div>
    </div>
    <footer>
        <div class="logo-text" style="color: #e6c328; margin-bottom: 10px;">أخِلَّاء للعطور</div>
        <p>جميع الحقوق محفوظة © 2026</p>
    </footer>
</body>
</html>
